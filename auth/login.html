<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Login — LocalLink</title>
<link rel="stylesheet" href="/css/style.css" />
<script>(function(){var t=localStorage.getItem("locallink-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<style>
  body { display: flex; align-items: center; min-height: 100vh; }
  .wrap { width: 100%; padding: 28px 24px; }
  .back-btn { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
  .back-btn svg { width: 20px; height: 20px; stroke: var(--text); }
  .field-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block; }
  .phone-input {
    display: flex; align-items: center; gap: 10px;
    height: 54px; padding: 0 16px; margin-bottom: 18px;
  }
  .phone-input .prefix { font-weight: 600; color: var(--text-muted); border-right: 1px solid var(--border); padding-right: 10px; }
  .phone-input input { flex: 1; border: none; background: transparent; outline: none; font-size: 16px; color: var(--text); letter-spacing: 0.5px; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 12px; color: var(--text-muted); }
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    height: 52px; width: 100%; border-radius: var(--radius-lg);
  }
  .google-btn img { width: 18px; height: 18px; }
  #recaptcha-container { display: flex; justify-content: center; margin-top: 8px; }
  .role-tag { display: inline-block; padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; background: var(--surface-2); margin-bottom: 18px; }
  .otp-boxes { justify-content: space-between; }
  .otp-box {
    width: 46px; height: 54px; text-align: center; font-size: 20px; font-weight: 700;
    border: none; outline: none; background: var(--card); color: var(--text);
  }
  .otp-box:focus { box-shadow: 0 0 0 2px var(--brand-500); }
</style>
</head>
<body>
<div class="wrap" id="phoneStep">
  <a class="back-btn glass" href="/auth/index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
  </a>

  <span class="role-tag" id="roleTag">Customer login</span>
  <h1>Enter your<br />phone number</h1>
  <p class="text-muted" style="margin-top:8px; margin-bottom:26px; font-size:14.5px;">We'll send a one-time code to verify it's you.</p>

  <label class="field-label">Mobile number</label>
  <div class="phone-input card">
    <span class="prefix">+91</span>
    <input type="tel" id="phoneInput" placeholder="98765 43210" maxlength="10" inputmode="numeric" />
  </div>

  <button class="btn btn-primary btn-block" id="sendOtpBtn" onclick="handleSendOtp()">Send OTP</button>

  <div id="recaptcha-container"></div>

  <div class="divider"><span>or continue with</span></div>

  <button class="google-btn card" onclick="handleGoogleLogin()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.4-1.9 14.3-5.1l-6.6-5.6C29.6 35.1 27 36 24 36c-5.3 0-9.7-3.4-11.3-8.1l-6.6 5.1C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4 5.6l6.6 5.6C41.5 36.2 44 30.6 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
    <span>Continue with Google</span>
  </button>

  <p class="text-muted" style="text-align:center; margin-top:20px; font-size:12.5px;">
    Wrong role? <a href="/auth/index.html" style="color:var(--brand-500); font-weight:600;">Go back</a>
  </p>
</div>

<!-- OTP step (shown after "Send OTP", stays on same page — confirmationResult lives in JS memory) -->
<div class="wrap" id="otpStep" style="display:none;">
  <button class="back-btn glass" onclick="showPhoneStep()">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <h1>Enter the<br />6-digit code</h1>
  <p class="text-muted" style="margin-top:8px; margin-bottom:26px; font-size:14.5px;">
    Sent to +91 <span id="phoneDisplay"></span> · <a href="#" onclick="handleSendOtp();return false;" style="color:var(--brand-500); font-weight:600;">Resend</a>
  </p>

  <div class="otp-boxes row gap-2" style="margin-bottom:22px;">
    <input class="otp-box card" maxlength="1" inputmode="numeric" />
    <input class="otp-box card" maxlength="1" inputmode="numeric" />
    <input class="otp-box card" maxlength="1" inputmode="numeric" />
    <input class="otp-box card" maxlength="1" inputmode="numeric" />
    <input class="otp-box card" maxlength="1" inputmode="numeric" />
    <input class="otp-box card" maxlength="1" inputmode="numeric" />
  </div>

  <button class="btn btn-primary btn-block" id="verifyOtpBtn" onclick="handleVerifyOtp()">Verify &amp; Continue</button>
  <p id="otpError" class="text-muted" style="text-align:center; margin-top:14px; font-size:13px; color:var(--rose); display:none;"></p>
</div>

<script src="/js/theme.js"></script>
<script type="module" src="/js/auth.js"></script>
</body>
</html>
