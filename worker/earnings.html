<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Earnings — LocalLink Worker</title>
<link rel="stylesheet" href="/css/style.css" />
<script>(function(){var t=localStorage.getItem("locallink-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<style>
  main { max-width: 480px; margin: 0 auto; padding-bottom: 100px; }
  @media (min-width: 768px) { main { max-width: 720px; } }
  .icon-btn { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .icon-btn svg { width: 20px; height: 20px; stroke: var(--text); }

  .balance-card { margin: 16px 20px; padding: 24px; border-radius: var(--radius-2xl); color: #fff; text-align: center; }
  .balance-card .label { font-size: 13px; opacity: 0.85; }
  .balance-card .amount { font-size: 2.2rem; font-weight: 800; margin: 8px 0 18px; }
  .balance-card .btn { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3); }

  .stat-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; margin-bottom: 20px; }
  .stat-box { padding: 14px; text-align: center; }
  .stat-box b { display: block; font-size: 16px; }
  .stat-box span { font-size: 11px; color: var(--text-muted); }

  .section { padding: 4px 20px 18px; }
  .section h2 { font-size: 15px; margin-bottom: 12px; }

  .tx-row { display: flex; align-items: center; gap: 12px; padding: 14px; margin-bottom: 10px; }
  .tx-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tx-icon svg { width: 18px; height: 18px; stroke: var(--emerald); }
  .tx-title { font-size: 13.5px; font-weight: 600; }
  .tx-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
  .tx-amount { margin-left: auto; font-size: 14px; font-weight: 700; color: var(--emerald); }
</style>
</head>
<body>
<main>
  <header class="navbar glass">
    <a class="icon-btn glass" href="/worker/dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <span class="logo" style="font-size:15px;">Earnings</span>
    <span style="width:40px;"></span>
  </header>

  <div class="balance-card bg-brand-gradient">
    <div class="label">Available balance</div>
    <div class="amount">₹5,260</div>
    <button class="btn" onclick="location.href='/worker/withdrawal.html'">Withdraw to bank / UPI</button>
  </div>

  <div class="stat-strip">
    <div class="stat-box card"><b>₹840</b><span>Today</span></div>
    <div class="stat-box card"><b>₹5,260</b><span>This week</span></div>
    <div class="stat-box card"><b>₹21.4k</b><span>This month</span></div>
  </div>

  <section class="section">
    <h2>Recent transactions</h2>

    <div class="tx-row card">
      <div class="tx-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg></div>
      <div>
        <div class="tx-title">Job completed — Priya Sharma</div>
        <div class="tx-sub">Today, 2:45 PM</div>
      </div>
      <div class="tx-amount">+₹149</div>
    </div>

    <div class="tx-row card">
      <div class="tx-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg></div>
      <div>
        <div class="tx-title">Job completed — Vikas Gupta</div>
        <div class="tx-sub">Today, 11:40 AM</div>
      </div>
      <div class="tx-amount">+₹149</div>
    </div>

    <div class="tx-row card">
      <div class="tx-icon" style="background:rgba(244,63,94,0.12);"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke="#F43F5E"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/></svg></div>
      <div>
        <div class="tx-title">Withdrawn to UPI</div>
        <div class="tx-sub">Yesterday, 6:00 PM</div>
      </div>
      <div class="tx-amount" style="color:var(--rose);">−₹2,000</div>
    </div>
  </section>
</main>

<nav class="tabbar glass">
  <a class="tab" href="/worker/dashboard.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    Home
  </a>
  <a class="tab" href="/worker/requests.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Requests
  </a>
  <a class="tab active" href="/worker/earnings.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    Earnings
  </a>
  <a class="tab" href="/customer/chat.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    Chat
  </a>
  <a class="tab" href="/worker/profile.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
    Profile
  </a>
</nav>
<script src="/js/theme.js"></script>
</body>
</html>
