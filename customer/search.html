<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Search — LocalLink</title>
<link rel="stylesheet" href="../css/style.css" />
<script>(function(){var t=localStorage.getItem("locallink-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<style>
  main { max-width: 480px; margin: 0 auto; padding-bottom: 100px; }
  @media (min-width: 768px) { main { max-width: 720px; } }
  .icon-btn { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .icon-btn svg { width: 20px; height: 20px; stroke: var(--text); }
  .search-wrap { padding: 14px 20px; }
  .search-bar {
    display: flex; align-items: center; gap: 10px;
    height: 52px; padding: 0 16px; border-radius: var(--radius-lg);
  }
  .search-bar input { flex: 1; border: none; background: transparent; outline: none; font-size: 15px; color: var(--text); }
  .search-bar svg { width: 19px; height: 19px; stroke: var(--text-muted); flex-shrink: 0; }
  .section { padding: 6px 20px 18px; }
  .section h3 { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
  .suggestion-chip {
    display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 999px;
    margin: 0 8px 8px 0; font-size: 13.5px; font-weight: 500;
  }
  .recent-row { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border); }
  .recent-row svg { width: 17px; height: 17px; stroke: var(--text-muted); flex-shrink: 0; }
  .recent-row span { flex: 1; font-size: 14px; }
  .recent-row .remove { width: 22px; height: 22px; stroke: var(--text-muted); }
  .result-empty { padding: 40px 20px; text-align: center; }
</style>
</head>
<body>
<main>
  <header class="navbar glass">
    <a class="icon-btn glass" href="../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <span class="logo" style="font-size:15px;">Search</span>
    <span style="width:40px;"></span>
  </header>

  <div class="search-wrap">
    <div class="search-bar card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Try 'fan repair' or 'bike puncture'" autofocus />
    </div>
  </div>

  <section class="section">
    <h3>Popular right now</h3>
    <div>
      <a class="suggestion-chip glass" href="category.html?c=electrician">⚡ Fan repair</a>
      <a class="suggestion-chip glass" href="category.html?c=plumber">💧 Water leakage</a>
      <a class="suggestion-chip glass" href="category.html?c=mechanic-bike">🏍️ Bike puncture</a>
      <a class="suggestion-chip glass" href="category.html?c=ac-repair">❄️ AC gas refill</a>
      <a class="suggestion-chip glass" href="category.html?c=cleaning">🧹 Deep cleaning</a>
      <a class="suggestion-chip glass" href="category.html?c=cctv-installation">📷 CCTV install</a>
    </div>
  </section>

  <section class="section">
    <h3>Recent searches</h3>
    <div id="recentList">
      <a class="recent-row" href="category.html?c=electrician">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <span>Electrician near me</span>
      </a>
      <a class="recent-row" href="category.html?c=plumber">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <span>Bathroom pipe leak</span>
      </a>
    </div>
  </section>
</main>

<nav class="tabbar glass">
  <a class="tab" href="../index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    Home
  </a>
  <a class="tab active" href="search.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
    Search
  </a>
  <a class="tab" href="bookings.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Bookings
  </a>
  <a class="tab" href="chat.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    Chat
  </a>
  <a class="tab" href="profile.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
    Profile
  </a>
</nav>

<script src="../js/theme.js"></script>
<script>
  // Simple natural-language keyword mapping (client-side only for now —
  // Cloud Function w/ proper NLP comes with backend integration pass)
  const KEYWORDS = {
    electrician: ["fan", "wiring", "switch", "short circuit", "mcb", "electrician"],
    plumber: ["leak", "pipe", "tap", "bathroom", "water", "plumber"],
    "mechanic-bike": ["bike", "puncture", "scooty", "two wheeler"],
    "ac-repair": ["ac", "cooling", "gas refill", "air conditioner"],
    cleaning: ["clean", "deep clean", "sofa", "carpet"],
  };
  document.getElementById("searchInput").addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const q = e.target.value.toLowerCase();
    let match = null;
    for (const [cat, words] of Object.entries(KEYWORDS)) {
      if (words.some((w) => q.includes(w))) { match = cat; break; }
    }
    window.location.href = match ? `category.html?c=${match}` : `category.html?q=${encodeURIComponent(q)}`;
  });
</script>
</body>
</html>
