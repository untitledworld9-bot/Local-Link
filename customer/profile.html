<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Profile — LocalLink</title>
<link rel="stylesheet" href="../css/style.css" />
<script>(function(){var t=localStorage.getItem("locallink-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<style>
  main { max-width: 480px; margin: 0 auto; padding-bottom: 100px; }
  @media (min-width: 768px) { main { max-width: 720px; } }
  .icon-btn { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .icon-btn svg { width: 20px; height: 20px; stroke: var(--text); }
  .profile-card { display: flex; align-items: center; gap: 14px; padding: 18px; margin: 16px 20px; }
  .p-avatar { width: 60px; height: 60px; border-radius: 18px; background: var(--surface-2); flex-shrink: 0; }
  .p-name { font-size: 16px; font-weight: 700; }
  .p-phone { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
  .p-edit { margin-left: auto; }
  .p-edit svg { width: 18px; height: 18px; stroke: var(--brand-500); }

  .wallet-strip { display: flex; align-items: center; gap: 14px; padding: 16px; margin: 0 20px 20px; color: #fff; border-radius: var(--radius-2xl); }
  .wallet-strip .w-label { font-size: 12px; opacity: 0.85; }
  .wallet-strip .w-amount { font-size: 19px; font-weight: 800; margin-top: 2px; }
  .wallet-strip .btn { margin-left: auto; height: 38px; padding: 0 16px; font-size: 12.5px; background: rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.3); }

  .menu-section { padding: 0 20px 18px; }
  .menu-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 10px; padding-left: 4px; }
  .menu-group { border-radius: var(--radius-xl); overflow: hidden; }
  .menu-row { display: flex; align-items: center; gap: 14px; padding: 15px 16px; text-decoration: none; color: inherit; }
  .menu-row + .menu-row { border-top: 1px solid var(--border); }
  .menu-icon { width: 34px; height: 34px; border-radius: 10px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .menu-icon svg { width: 16px; height: 16px; stroke: var(--brand-500); }
  .menu-row span { font-size: 13.5px; font-weight: 500; }
  .menu-chevron { margin-left: auto; width: 16px; height: 16px; stroke: var(--text-muted); }
  .logout-btn { color: var(--rose) !important; }
  .logout-btn .menu-icon svg { stroke: var(--rose); }
</style>
</head>
<body>
<main>
  <header class="navbar glass">
    <span class="logo" style="font-size:15px;">Profile</span>
    <button class="icon-btn glass" onclick="toggleTheme()" aria-label="Toggle theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
  </header>

  <div class="profile-card card">
    <div class="p-avatar"></div>
    <div>
      <div class="p-name">Abna</div>
      <div class="p-phone">+91 98765 43210</div>
    </div>
    <a class="p-edit" href="edit-profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/></svg>
    </a>
  </div>

  <div class="wallet-strip bg-brand-gradient">
    <div>
      <div class="w-label">Wallet balance</div>
      <div class="w-amount">₹0</div>
    </div>
    <a class="btn" href="wallet.html">Add money</a>
  </div>

  <section class="menu-section">
    <div class="menu-label">Account</div>
    <div class="menu-group card">
      <a class="menu-row" href="addresses.html">
        <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 22s8-7.5 8-13a8 8 0 10-16 0c0 5.5 8 13 8 13z"/><circle cx="12" cy="9" r="2.5"/></svg></div>
        <span>Saved addresses</span>
        <svg class="menu-chevron" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </a>
      <a class="menu-row" href="favourites.html">
        <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 000-7.8z"/></svg></div>
        <span>Favourite workers</span>
        <svg class="menu-chevron" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </a>
      <a class="menu-row" href="invoices.html">
        <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg></div>
        <span>Invoices</span>
        <svg class="menu-chevron" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </a>
    </div>
  </section>

  <section class="menu-section">
    <div class="menu-label">More</div>
    <div class="menu-group card">
      <a class="menu-row" href="referral.html">
        <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M17 8l3 3-3 3"/></svg></div>
        <span>Refer & earn</span>
        <svg class="menu-chevron" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </a>
      <a class="menu-row" href="become-worker.html">
        <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M14.7 6.3l3 3L7 20H4v-3L14.7 6.3z"/></svg></div>
        <span>Become a professional</span>
        <svg class="menu-chevron" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </a>
      <a class="menu-row" href="support.html">
        <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 015.8 1c0 2-3 2-3 4"/><path d="M12 17h.01"/></svg></div>
        <span>Help & support</span>
        <svg class="menu-chevron" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </a>
      <a class="menu-row" href="settings.html">
        <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></div>
        <span>Settings</span>
        <svg class="menu-chevron" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </a>
    </div>
  </section>

  <section class="menu-section">
    <div class="menu-group card">
      <a class="menu-row logout-btn" href="../auth/index.html">
        <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></div>
        <span>Log out</span>
      </a>
    </div>
  </section>
</main>

<nav class="tabbar glass">
  <a class="tab" href="../index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    Home
  </a>
  <a class="tab" href="search.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
    Search
  </a>
  <a class="tab" href="bookings.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Bookings
  </a>
  <a class="tab" href="chat.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    Chat

  <a class="tab active" href="profile.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
    Profile
  </a>
</nav>
<script src="../js/theme.js"></script>
</body>
</html>
