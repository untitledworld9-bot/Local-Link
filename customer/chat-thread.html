<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Ramesh Kumar — Chat | LocalLink</title>
<link rel="stylesheet" href="../css/style.css" />
<script>(function(){var t=localStorage.getItem("locallink-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<style>
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .thread-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; flex-shrink: 0; }
  .icon-btn { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .icon-btn svg { width: 20px; height: 20px; stroke: var(--text); }
  .th-avatar { width: 40px; height: 40px; border-radius: 12px; background: var(--surface-2); flex-shrink: 0; }
  .th-name { font-size: 14.5px; font-weight: 700; }
  .th-status { font-size: 11.5px; color: var(--emerald); }
  .th-actions { margin-left: auto; display: flex; gap: 6px; }

  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; }
  .msg-row { display: flex; max-width: 78%; }
  .msg-row.me { align-self: flex-end; justify-content: flex-end; }
  .bubble { padding: 10px 14px; border-radius: 16px; font-size: 13.5px; line-height: 1.4; margin: 3px 0; }
  .msg-row.them .bubble { background: var(--surface-2); border-bottom-left-radius: 4px; }
  .msg-row.me .bubble { background: var(--brand-500); color: #fff; border-bottom-right-radius: 4px; }
  .msg-time { font-size: 10px; color: var(--text-muted); margin: 0 6px; align-self: flex-end; }
  .date-divider { text-align: center; font-size: 11px; color: var(--text-muted); margin: 14px 0 6px; }
  .location-bubble { display: flex; align-items: center; gap: 8px; }
  .location-bubble svg { width: 16px; height: 16px; }

  .input-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); flex-shrink: 0; }
  .input-bar input {
    flex: 1; height: 44px; border-radius: 22px; border: 1px solid var(--border); background: var(--card);
    padding: 0 16px; font-size: 13.5px; color: var(--text); outline: none;
  }
  .round-btn { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--surface-2); }
  .round-btn svg { width: 18px; height: 18px; stroke: var(--text-muted); }
  .send-btn { background: var(--brand-500); }
  .send-btn svg { stroke: #fff; }
</style>
</head>
<body>
  <header class="thread-header glass">
    <a class="icon-btn" href="chat.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="th-avatar"></div>
    <div>
      <div class="th-name">Ramesh Kumar</div>
      <div class="th-status">Online · Electrician</div>
    </div>
    <div class="th-actions">
      <a class="icon-btn" href="tel:+919876543210">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.36 1.9.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0122 16.92z"/></svg>
      </a>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="date-divider">Today</div>

    <div class="msg-row them">
      <div class="bubble">Namaste! Main aapka booking dekh raha hoon, 11 baje pahunch jaunga.</div>
    </div>
    <div class="msg-row them" style="margin-bottom:10px;">
      <span class="msg-time">10:42 AM</span>
    </div>

    <div class="msg-row me">
      <div class="bubble">Theek hai, dhanyavaad! Fan ki wiring mein problem hai.</div>
    </div>
    <div class="msg-row me" style="margin-bottom:10px;">
      <span class="msg-time">10:44 AM</span>
    </div>

    <div class="msg-row them">
      <div class="bubble location-bubble">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-7.5 8-13a8 8 0 10-16 0c0 5.5 8 13 8 13z"/><circle cx="12" cy="9" r="2.5"/></svg>
        Live location shared
      </div>
    </div>
    <div class="msg-row them" style="margin-bottom:10px;">
      <span class="msg-time">10:50 AM</span>
    </div>

    <div class="msg-row them">
      <div class="bubble">On my way, will reach in 10 mins</div>
    </div>
    <div class="msg-row them">
      <span class="msg-time">11:02 AM</span>
    </div>
  </div>

  <div class="input-bar glass">
    <button class="round-btn" aria-label="Attach">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <input type="text" id="msgInput" placeholder="Type a message…" />
    <button class="round-btn" aria-label="Voice note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4"/></svg>
    </button>
    <button class="round-btn send-btn" id="sendBtn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

<script src="../js/theme.js"></script>
<script>
  // UI-only message send for now — Firestore real-time listener wired
  // in the backend integration pass (typing indicator, seen/delivered status).
  const messages = document.getElementById("messages");
  const input = document.getElementById("msgInput");

  function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    const row = document.createElement("div");
    row.className = "msg-row me";
    row.innerHTML = `<div class="bubble">${text.replace(/</g, "&lt;")}</div>`;
    messages.appendChild(row);
    input.value = "";
    messages.scrollTop = messages.scrollHeight;
  }

  document.getElementById("sendBtn").addEventListener("click", sendMessage);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });
  messages.scrollTop = messages.scrollHeight;
</script>
</body>
</html>
