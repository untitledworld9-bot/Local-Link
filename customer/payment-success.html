<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Booking confirmed — LocalLink</title>
<link rel="stylesheet" href="/css/style.css" />
<script>(function(){var t=localStorage.getItem("locallink-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<style>
  body { display: flex; align-items: center; min-height: 100vh; }
  .wrap { width: 100%; padding: 32px 24px; text-align: center; }
  .check-circle {
    width: 84px; height: 84px; border-radius: 50%; margin: 0 auto 22px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(34,197,94,0.12);
  }
  .check-circle svg { width: 40px; height: 40px; stroke: var(--emerald); }
  .booking-card { padding: 18px; text-align: left; margin: 24px 0; }
  .b-row { display: flex; justify-content: space-between; font-size: 13.5px; padding: 8px 0; }
  .b-row span:first-child { color: var(--text-muted); }
  .b-row span:last-child { font-weight: 600; }
  .b-row + .b-row { border-top: 1px solid var(--border); }
</style>
</head>
<body>
<div class="wrap">
  <div class="check-circle fade-up">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
  </div>
  <h1>Booking confirmed!</h1>
  <p class="text-muted" style="margin-top:8px; font-size:14.5px;">Ramesh Kumar has been notified and will accept shortly.</p>

  <div class="booking-card card">
    <div class="b-row"><span>Service</span><span>Electrician</span></div>
    <div class="b-row"><span>Date &amp; time</span><span>Today, 11:00 AM</span></div>
    <div class="b-row"><span>Address</span><span>Home</span></div>
    <div class="b-row"><span>Amount paid</span><span>₹159</span></div>
    <div class="b-row"><span>Booking ID</span><span>#LL2607130042</span></div>
  </div>

  <a class="btn btn-primary btn-block" href="/customer/bookings.html">Track booking</a>
  <a class="btn btn-ghost btn-block" href="/index.html" style="margin-top:10px;">Back to home</a>
</div>
<script src="/js/theme.js"></script>
</body>
</html>
